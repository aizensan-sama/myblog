---
layout: default
title: Home
---
<div style="max-width: 800px; margin: 0 auto; padding: 2rem 0;">
    <h1 style="font-family: var(--font-heading); font-size: 2.25rem; font-weight: 800; margin-bottom: 2rem; border-bottom: 2px solid var(--card-border); padding-bottom: 0.5rem;">
        Articles & Publications
    </h1>
    
    <div class="posts-list" style="display: flex; flex-direction: column; gap: 2rem;">
        {% for post in site.posts %}
        <article class="post-card" style="background-color: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 1.75rem; box-shadow: var(--shadow); transition: transform var(--transition-speed); display: flex; flex-direction: column; gap: 0.75rem;">
            <h2 style="font-family: var(--font-heading); font-size: 1.5rem; font-weight: 700; margin: 0;">
                <a href="{{ post.url | relative_url }}" style="color: var(--text-color); text-decoration: none; transition: color var(--transition-speed);" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--text-color)'">
                    {{ post.title }}
                </a>
            </h2>
            <div style="font-size: 0.85rem; color: var(--text-muted); font-weight: 500;">
                {{ post.date | date: "%B %d, %Y" }} • {{ post.read_time }}
            </div>
            <p style="margin: 0; color: var(--text-color); opacity: 0.85; font-size: 0.95rem; line-height: 1.5;">
                {{ post.description }}
            </p>
            <a href="{{ post.url | relative_url }}" style="display: inline-block; align-self: flex-start; margin-top: 0.5rem; font-family: var(--font-heading); font-weight: 600; font-size: 0.9rem; color: var(--primary); text-decoration: none; transition: transform var(--transition-speed);" onmouseover="this.style.transform='translateX(5px)'" onmouseout="this.style.transform='none'">
                Read Article &rarr;
            </a>
        </article>
        {% else %}
        <p style="color: var(--text-muted); font-style: italic;">No posts found yet.</p>
        {% endfor %}
    </div>
</div>
