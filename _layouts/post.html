---
layout: default
---
<article>
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
        <span>Published on {{ page.date | date: "%B %d, %Y" }}</span>
        <span>•</span>
        <span>{{ page.read_time | default: "5 Min Read" }}</span>
        <span>•</span>
        <span>by {{ page.author | default: "Ayman" }}</span>
    </div>

    <div class="post-content">
        {{ content }}
    </div>
</article>
